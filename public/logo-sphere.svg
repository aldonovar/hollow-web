<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gLogo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(0, 0)">
    <g filter="url(#glow)">
      <!-- Main rings -->
      <circle cx="50" cy="50" r="42" stroke="url(#gLogo)" stroke-width="3.5" stroke-linecap="round" fill="none" />
      <!-- Inner atomic rings -->
      <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9" />
      <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(60 50 50)" opacity="0.9" />
      <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(120 50 50)" opacity="0.9" />
    </g>
  </g>
</svg>
